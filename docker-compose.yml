        cpus: '0.5'
        memory: 256M
      reservations:
        cpus: '0.1'
        memory: 64M
  logging:
    <<: *logging-environment

# PHPMyAdmin for MySQL management
phpmyadmin:
  image: phpmyadmin:5.2.1
  container_name: phpmyadmin
  restart: always
  ports:
    - "8084:80"
  environment:
    - PMA_HOST=database
    - PMA_PORT=3306
    - PMA_ARBITRARY=1
    - UPLOAD_LIMIT=100M
    - MEMORY_LIMIT=256M
    - MAX_EXECUTION_TIME=300
  networks:
    - pterodactyl_network
  depends_on:
    - database
  deploy:
    resources:
      limits:
        cpus: '0.5'
        memory: 256M
      reservations:
        cpus: '0.1'
        memory: 64M
  logging:
    <<: *logging-environment

# Mailhog for email testing
mailhog:
  image: mailhog/mailhog:v1.0.1
  container_name: mailhog
  restart: always
  ports:
    - "8025:8025"
    - "1025:1025"
  environment:
    - MH_STORAGE=maildir
    - MH_MAILDIR_PATH=/maildir
    - MH_UI_WEB_PATH=/
    - MH_UI_BODY_PART_LIMIT=100
    - MH_UI_MESSAGE_LIMIT=100
    - MH_UI_WS_READ_TIMEOUT=5s
    - MH_UI_WS_WRITE_TIMEOUT=5s
    - MH_UI_WS_PING_INTERVAL=10s
    - MH_UI_WS_PONG_TIMEOUT=10s
    - MH_SMTP_BIND_ADDR=0.0.0.0:1025
    - MH_SMTP_HOSTNAME=mailhog
    - MH_SMTP_MAX_MESSAGE_SIZE=10485760
    - MH_SMTP_AUTH_ENABLED=false
    - MH_SMTP_AUTH_ALLOW_INSECURE=false
    - MH_SMTP_AUTH_USER=admin
    - MH_SMTP_AUTH_PASSWORD=mailhog_password_2024
    - MH_HTTP_BIND_ADDR=0.0.0.0:8025
    - MH_HTTP_WEB_ROOT=/
    - MH_HTTP_STATIC_PATH=/static
    - MH_HTTP_AUTH_ENABLED=false
    - MH_HTTP_AUTH_USER=admin
    - MH_HTTP_AUTH_PASSWORD=mailhog_http_2024
    - MH_HTTP_REALM=MailHog
    - MH_HTTP_CORS_ENABLED=false
    - MH_HTTP_CORS_ORIGIN=*
    - MH_HTTP_CORS_METHODS=GET,POST,PUT,DELETE,OPTIONS
    - MH_HTTP_CORS_HEADERS=Origin,Accept-Encoding,Authorization,Content-Type
    - MH_HTTP_CORS_CREDENTIALS=true
    - MH_HTTP_CORS_MAX_AGE=86400
    - MH_HTTP_SSL_ENABLED=false
    - MH_HTTP_SSL_KEY=/ssl/key.pem
    - MH_HTTP_SSL_CERT=/ssl/cert.pem
    - MH_HTTP_SSL_CA=/ssl/ca.pem
    - MH_HTTP_SSL_REDIRECT=false
    - MH_HTTP_SSL_REDIRECT_PORT=443
    - MH_HTTP_SSL_SKIP_VERIFY=false
    - MH_HTTP_SSL_CLIENT_AUTH=none
    - MH_HTTP_SSL_CLIENT_CA=/ssl/client-ca.pem
    - MH_HTTP_SSL_CLIENT_KEY=/ssl/client-key.pem
    - MH_HTTP_SSL_CLIENT_CERT=/ssl/client-cert.pem
    - MH_HTTP_SSL_CLIENT_PASSPHRASE=
    - MH_LOG_LEVEL=info
    - MH_LOG_FORMAT=text
    - MH_LOG_FILE=/logs/mailhog.log
    - MH_LOG_MAX_SIZE=100M
    - MH_LOG_MAX_BACKUPS=10
