    LOG_SPLUNK_INDEX: "pterodactyl"
    LOG_SPLUNK_INSECURE: "false"
    LOG_SPLUNK_VERIFY: "true"
    LOG_SPLUNK_CA_FILE: "/etc/ssl/certs/ca-certificates.crt"
    LOG_SPLUNK_CERT_FILE: "/etc/ssl/certs/client.crt"
    LOG_SPLUNK_KEY_FILE: "/etc/ssl/private/client.key"
    LOG_SPLUNK_KEY_PASSWORD: "splunk-key-password"
    LOG_AWS_ACCESS_KEY_ID: "AKIAXXXXXXXXXXXXXXXX"
    LOG_AWS_SECRET_ACCESS_KEY: "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
    LOG_AWS_REGION: "us-east-1"
    LOG_AWS_GROUP_NAME: "pterodactyl"
    LOG_AWS_STREAM_NAME: "panel"
    LOG_AWS_LOGGING_ENABLED: "true"
    LOG_AWS_LOGGING_TIMEOUT: "5s"
    LOG_AWS_LOGGING_RETRY: "3"
    LOG_AWS_LOGGING_BATCH_SIZE: "100"
    LOG_AWS_LOGGING_BATCH_INTERVAL: "5s"
    
  # Security configuration
  security:
    &security-environment
    SECURITY_HEADER_ENABLED: "true"
    SECURITY_HEADER_FRAME_OPTIONS: "SAMEORIGIN"
    SECURITY_HEADER_XSS_PROTECTION: "1; mode=block"
    SECURITY_HEADER_CONTENT_TYPE: "nosniff"
    SECURITY_HEADER_REFERRER_POLICY: "strict-origin-when-cross-origin"
    SECURITY_HEADER_HSTS: "max-age=31536000; includeSubDomains; preload"
    SECURITY_HEADER_CSP: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:; frame-src 'self'; object-src 'none'"
    SECURITY_HEADER_CSP_REPORT_ONLY: "false"
    SECURITY_HEADER_CSP_REPORT_URI: "/csp-report"
    SECURITY_HEADER_PERMISSIONS_POLICY: "geolocation=(), microphone=(), camera=(), payment=(), usb=(), bluetooth=(), screen-wake-lock=(), xr-spatial-tracking=(), autoplay=()"
    SECURITY_HEADER_FEATURE_POLICY: "geolocation 'none'; microphone 'none'; camera 'none'; payment 'none'"
    SECURITY_HEADER_CROSS_ORIGIN_OPENER_POLICY: "same-origin"
    SECURITY_HEADER_CROSS_ORIGIN_EMBEDDER_POLICY: "require-corp"
    SECURITY_HEADER_CROSS_ORIGIN_RESOURCE_POLICY: "cross-origin"
    SECURITY_HEADER_CONTENT_SECURITY_POLICY: "default-src 'self'"
    SECURITY_HEADER_CONTENT_SECURITY_POLICY_REPORT_ONLY: "false"
    SECURITY_HEADER_CONTENT_SECURITY_POLICY_REPORT_URI: "/csp-report"
    SECURITY_HEADER_STRICT_TRANSPORT_SECURITY: "max-age=31536000; includeSubDomains; preload"
    SECURITY_HEADER_X_FRAME_OPTIONS: "SAMEORIGIN"
    SECURITY_HEADER_X_XSS_PROTECTION: "1; mode=block"
    SECURITY_HEADER_X_CONTENT_TYPE_OPTIONS: "nosniff"
    SECURITY_HEADER_REFERRER_POLICY: "strict-origin-when-cross-origin"
    SECURITY_HEADER_ORIGIN_AGENT_CLUSTER: "?1"
    SECURITY_HEADER_X_DNS_PREFETCH_CONTROL: "off"
    SECURITY_HEADER_X_DOWNLOAD_OPTIONS: "noopen"
    SECURITY_HEADER_X_PERMITTED_CROSS_DOMAIN_POLICIES: "none"
    
  # Backup configuration
  backup:
    &backup-environment
    BACKUP_ENABLED: "true"
    BACKUP_SCHEDULE: "0 2 * * *"
    BACKUP_RETENTION_DAYS: "30"
    BACKUP_COMPRESSION: "gzip"
    BACKUP_COMPRESSION_LEVEL: "6"
    BACKUP_ENCRYPTION: "true"
    BACKUP_ENCRYPTION_PASSWORD: "backup-encryption-password-2024"
    BACKUP_STORAGE: "local"
    BACKUP_PATH: "/srv/pterodactyl/backups"
    BACKUP_BUCKET: "pterodactyl-backups"
    BACKUP_REGION: "us-east-1"
    BACKUP_ACCESS_KEY: "AKIAXXXXXXXXXXXXXXXX"
    BACKUP_SECRET_KEY: "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
    BACKUP_ENDPOINT: "https://s3.amazonaws.com"
    BACKUP_SSL_VERIFY: "true"
    BACKUP_TIMEOUT: "3600"
    BACKUP_RETRY: "3"
    BACKUP_RETRY_DELAY: "60"
    BACKUP_PARALLEL: "4"
    BACKUP_VERBOSE: "false"
    BACKUP_DEBUG: "false"
    BACKUP_DRY_RUN: "false"
    BACKUP_EXCLUDE: "cache,logs,tmp"
    BACKUP_INCLUDE: "config,storage,database"
    BACKUP_PRE_SCRIPT: "/scripts/backup-pre.sh"
    BACKUP_POST_SCRIPT: "/scripts/backup-post.sh"
    BACKUP_SUCCESS_SCRIPT: "/scripts/backup-success.sh"
    BACKUP_FAILURE_SCRIPT: "/scripts/backup-failure.sh"
    BACKUP_NOTIFICATION_ENABLED: "true"
    BACKUP_NOTIFICATION_CHANNEL: "email"
    BACKUP_NOTIFICATION_EMAIL: "admin@yourdomain.com"
    BACKUP_NOTIFICATION_SLACK_WEBHOOK: "https://hooks.slack.com/services/T00000000/B00000000/XXXXXXXXXXXXXXXXXXXXXXXX"
    BACKUP_NOTIFICATION_DISCORD_WEBHOOK: "https://discord.com/api/webhooks/000000000000000000/XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX"
    BACKUP_NOTIFICATION_TELEGRAM_BOT_TOKEN: "1234567890:XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX"
    BACKUP_NOTIFICATION_TELEGRAM_CHAT_ID: "-1001234567890"
    
  # Performance configuration
  performance:
    &performance-environment
    PERFORMANCE_MAX_CHILDREN: "150"
    PERFORMANCE_START_SERVERS: "8"
    PERFORMANCE_MIN_SPARE_SERVERS: "4"
    PERFORMANCE_MAX_SPARE_SERVERS: "16"
    PERFORMANCE_MAX_REQUESTS: "10000"
    PERFORMANCE_MAX_CONNECTIONS: "1000"
    PERFORMANCE_KEEPALIVE_TIMEOUT: "75"
    PERFORMANCE_SEND_TIMEOUT: "60"
    PERFORMANCE_UPLOAD_TIMEOUT: "60"
    PERFORMANCE_MAX_UPLOAD_SIZE: "100M"
    PERFORMANCE_MAX_POST_SIZE: "100M"
    PERFORMANCE_MEMORY_LIMIT: "512M"
    PERFORMANCE_MAX_EXECUTION_TIME: "300"
    PERFORMANCE_MAX_INPUT_TIME: "300"
    PERFORMANCE_MAX_INPUT_VARS: "1000"
    PERFORMANCE_OPCACHE_ENABLED: "true"
    PERFORMANCE_OPCACHE_MEMORY_CONSUMPTION: "256"
    PERFORMANCE_OPCACHE_INTERNED_STRINGS_BUFFER: "16"
    PERFORMANCE_OPCACHE_MAX_ACCELERATED_FILES: "10000"
    PERFORMANCE_OPCACHE_REVALIDATE_FREQ: "2"
    PERFORMANCE_OPCACHE_FAST_SHUTDOWN: "true"
    PERFORMANCE_OPCACHE_ENABLE_FILE_OVERRIDE: "true"
    PERFORMANCE_OPCACHE_MAX_WASTED_PERCENTAGE: "5"
    PERFORMANCE_OPCACHE_USE_CWD: "true"
    PERFORMANCE_OPCACHE_VALIDATE_TIMESTAMPS: "true"
    PERFORMANCE_OPCACHE_BLACKLIST_FILENAME: "/etc/php/opcache-blacklist.txt"
    PERFORMANCE_OPCACHE_MAX_FILE_SIZE: "0"
    PERFORMANCE_OPCACHE_CONSISTENCY_CHECKS: "0"
    PERFORMANCE_OPCACHE_FORCE_RESTART_TIMEOUT: "180"
    PERFORMANCE_OPCACHE_ERROR_LOG: "/var/log/php/opcache.log"
    PERFORMANCE_OPCACHE_LOG_VERBOSITY_LEVEL: "1"
    PERFORMANCE_OPCACHE_PREFERRED_MEMORY_MODEL: ""
    PERFORMANCE_OPCACHE_PROTECT_MEMORY: "0"
    PERFORMANCE_OPCACHE_RECORD_WARNINGS: "0"
    PERFORMANCE_OPCACHE_SAVE_COMMENTS: "1"
    PERFORMANCE_OPCACHE_STRIP_COMMENTS: "0"
    PERFORMANCE_OPCACHE_TRACE_FILE: "/var/log/php/opcache.trace"
    PERFORMANCE_OPCACHE_TRACE_LEVEL: "0"
    PERFORMANCE_OPCACHE_TRACE_TYPES: "0"
    
  # Network configuration
  network:
    &network-environment
    NETWORK_SUBNET: "172.20.0.0/16"
    NETWORK_GATEWAY: "172.20.0.1"
    NETWORK_IP_RANGE: "172.20.0.0/24"
    NETWORK_AUX_ADDRESSES: '{"host1":"172.20.0.10","host2":"172.20.0.11"}'
    NETWORK_DRIVER: "bridge"
    NETWORK_DRIVER_OPTS: '{"com.docker.network.bridge.name":"pterodactyl0","com.docker.network.bridge.enable_ip_masquerade":"true","com.docker.network.bridge.enable_icc":"true","com.docker.network.bridge.host_binding_ipv4":"0.0.0.0"}'
    NETWORK_LABELS: '{"maintained_by":"pterodactyl","environment":"production"}'
    NETWORK_ATTACHABLE: "true"
    NETWORK_INTERNAL: "false"
    NETWORK_IPAM_DRIVER: "default"
    NETWORK_IPAM_CONFIG: '{"Subnet":"172.20.0.0/16","Gateway":"172.20.0.1","IPRange":"172.20.0.0/24"}'
    NETWORK_IPAM_OPTIONS: '{}'
    NETWORK_ENABLE_IPV6: "true"
    NETWORK_IPV6_SUBNET: "2001:db8:1::/64"
    NETWORK_IPV6_GATEWAY: "2001:db8:1::1"
    NETWORK_IPV6_IP_RANGE: "2001:db8:1::/80"
    NETWORK_IPV6_AUX_ADDRESSES: '{"host1":"2001:db8:1::10","host2":"2001:db8:1::11"}'
    NETWORK_LABELS: '{"maintained_by":"pterodactyl"}'
    NETWORK_SCOPE: "local"
    NETWORK_INGRESS: "false"
    
  # Service configuration
  service:
    &service-environment
    SERVICE_RESTART: "always"
    SERVICE_RESTART_RETRIES: "5"
    SERVICE_RESTART_DELAY: "5s"
    SERVICE_RESTART_MAX_DELAY: "30s"
    SERVICE_RESTART_WINDOW: "60s"
    SERVICE_RESTART_BACKOFF: "exponential"
    SERVICE_RESTART_BACKOFF_RATE: "2"
    SERVICE_RESTART_BACKOFF_MAX: "30s"
    SERVICE_DEPENDENCIES: "database,cache"
    SERVICE_DEPENDENCIES_CONDITION: "service_healthy"
    SERVICE_DEPENDENCIES_RESTART: "true"
    SERVICE_DEPENDENCIES_TIMEOUT: "120s"
    SERVICE_DEPENDENCIES_ORDER: "start-first"
    SERVICE_STOP_GRACE_PERIOD: "60s"
    SERVICE_STOP_SIGNAL: "SIGTERM"
    SERVICE_STOP_TIMEOUT: "30s"
    SERVICE_STOP_WAIT: "10s"
    SERVICE_KILL_SIGNAL: "SIGKILL"
    SERVICE_KILL_TIMEOUT: "5s"
    SERVICE_START_PERIOD: "30s"
    SERVICE_START_TIMEOUT: "60s"
    SERVICE_HEALTHCHECK: "true"
    SERVICE_HEALTHCHECK_INTERVAL: "30s"
    SERVICE_HEALTHCHECK_TIMEOUT: "10s"
    SERVICE_HEALTHCHECK_RETRIES: "3"
    SERVICE_HEALTHCHECK_START_PERIOD: "60s"
    SERVICE_HEALTHCHECK_DISABLE: "false"
    SERVICE_HEALTHCHECK_TEST: "curl -f http://localhost/health || exit 1"
    SERVICE_SCALE: "1"
    SERVICE_SCALE_MIN: "1"
    SERVICE_SCALE_MAX: "10"
    SERVICE_SCALE_STEP: "1"
    SERVICE_SCALE_ADJUST: "auto"
    SERVICE_SCALE_THRESHOLD: "80%"
    SERVICE_SCALE_COOLDOWN: "60s"
    SERVICE_SCALE_STABILIZATION: "30s"
    SERVICE_SCALE_POLICY: "cpu"
    SERVICE_SCALE_METRICS: "cpu,memory,connections"
    
  # DNS configuration
  dns:
    &dns-environment
    DNS_SERVERS: '["8.8.8.8","1.1.1.1","9.9.9.9"]'
    DNS_SEARCH_DOMAINS: '["yourdomain.com","internal.yourdomain.com"]'
    DNS_OPTIONS: '["ndots:2","timeout:3","attempts:2"]'
    DNS_NAMESERVERS: '["8.8.8.8","1.1.1.1"]'
    DNS_DOMAIN: "yourdomain.com"
    DNS_HOSTS: '{"host1":"192.168.1.100","host2":"192.168.1.101"}'
    DNS_RESOLV_CONF: "/etc/resolv.conf"
    DNS_ETC_HOSTS: "/etc/hosts"
    DNS_CACHE_ENABLED: "true"
    DNS_CACHE_SIZE: "1000"
    DNS_CACHE_TTL: "300"
    DNS_CACHE_NEGATIVE_TTL: "60"
    DNS_RELOAD_INTERVAL: "60"
    DNS_DEBUG: "false"
    
# =============================================================================
# SERVICES
# =============================================================================
services:
  # ===== DATABASE SERVICES =====
  database:
    image: mariadb:10.11
    container_name: pterodactyl-database
    restart: always
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=2G
      --innodb-log-file-size=512M
      --innodb-flush-log-at-trx-commit=2
      --innodb-flush-method=O_DIRECT
      --key-buffer-size=256M
      --max-allowed-packet=256M
      --table-open-cache=2000
      --sort-buffer-size=4M
      --read-buffer-size=2M
      --read-rnd-buffer-size=8M
      --myisam-sort-buffer-size=128M
      --thread-cache-size=128
      --query-cache-size=128M
      --query-cache-limit=4M
      --tmp-table-size=64M
      --max-heap-table-size=64M
      --wait-timeout=28800
      --interactive-timeout=28800
      --connect-timeout=10
      --max-connections=500
      --log-bin=/var/log/mysql/mysql-bin
      --binlog-format=MIXED
      --expire-logs-days=7
      --max-binlog-size=100M
      --log-error=/var/log/mysql/error.log
      --slow-query-log=1
      --slow-query-log-file=/var/log/mysql/slow.log
      --long-query-time=2
      --log-queries-not-using-indexes=1
      --log-slow-admin-statements=1
      --log-slow-slave-statements=1
      --log-warnings=2
      --general-log=0
      --general-log-file=/var/log/mysql/general.log
      --innodb-status-file=1
      --innodb-status-file-limit=100M
      --performance-schema=1
      --performance-schema-consumer-events-statements-current=1
      --performance-schema-consumer-events-waits-current=1
      --performance-schema-consumer-events-stages-current=1
      --performance-schema-consumer-global-instrumentation=1
      --performance-schema-consumer-thread-instrumentation=1
      --performance-schema-consumer-statements-digest=1
      --performance-schema-account-size=1000
      --performance-schema-host-size=500
      --performance-schema-user-size=500
      --performance-schema-max-sql-text-length=1024
      --performance-schema-max-stack-depth=32
    volumes:
      - "/srv/pterodactyl/database:/var/lib/mysql"
      - "/srv/pterodactyl/database/config:/etc/mysql/conf.d"
      - "/srv/pterodactyl/database/backup:/backup"
      - "/srv/pterodactyl/database/logs:/var/log/mysql"
    environment:
      <<: *db-environment
    ports:
      - "3306:3306"
    networks:
      - pterodactyl_network
      - monitoring_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4096M
        reservations:
          cpus: '1.0'
          memory: 1024M
    logging:
      <<: *logging-environment
      
  # ===== CACHE SERVICES =====
  cache:
    image: redis:7.2-alpine
    container_name: pterodactyl-cache
    restart: always
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
      --maxmemory 1024mb
      --maxmemory-policy allkeys-lru
      --maxmemory-samples 5
      --lru-cache 1000000
      --hash-max-ziplist-entries 512
      --hash-max-ziplist-value 64
      --list-max-ziplist-size -2
      --list-compress-depth 0
      --set-max-intset-entries 512
      --zset-max-ziplist-entries 128
      --zset-max-ziplist-value 64
      --hll-sparse-max-bytes 3000
      --activerehashing yes
      --client-output-buffer-limit normal 0 0 0
      --client-output-buffer-limit replica 256mb 64mb 60
      --client-output-buffer-limit pubsub 32mb 8mb 60
      --hz 10
      --dynamic-hz yes
      --aof-rewrite-incremental-fsync yes
      --rdb-save-incremental-fsync yes
      --lazyfree-lazy-eviction no
      --lazyfree-lazy-expire no
      --lazyfree-lazy-server-del no
      --replica-lazy-flush no
      --lazyfree-lazy-user-del no
      --lazyfree-lazy-user-flush no
      --io-threads 4
      --io-threads-do-reads yes
      --aof-use-rdb-preamble yes
      --rdbchecksum yes
      --dbfilename dump.rdb
      --dir /data
      --requirepass redis_secure_password_2024
      --masterauth redis_secure_password_2024
      --protected-mode yes
      --bind 0.0.0.0
      --port 6379
      --tcp-backlog 511
      --timeout 0
      --tcp-keepalive 300
      --daemonize no
      --pidfile /var/run/redis_6379.pid
      --loglevel notice
      --logfile /var/log/redis/redis.log
      --syslog-enabled yes
      --syslog-ident redis
      --syslog-facility local0
      --databases 16
      --stop-writes-on-bgsave-error yes
      --rdbcompression yes
      --rdb-del-sync-files no
      --repl-diskless-sync yes
      --repl-diskless-sync-delay 5
      --repl-diskless-load disabled
      --repl-disable-tcp-nodelay no
      --repl-backlog-size 64mb
      --repl-backlog-ttl 3600
      --repl-ping-replica-period 10
      --repl-timeout 60
      --repl-min-replicas-to-write 0
      --repl-min-replicas-max-lag 10
      --replica-serve-stale-data yes
      --replica-read-only yes
      --replica-ignore-disk-write-errors no
      --replica-priority 100
      --replica-announce-ip ""
      --replica-announce-port 0
      --cluster-enabled no
      --cluster-config-file nodes-6379.conf
      --cluster-node-timeout 15000
      --cluster-port 16379
      --cluster-announce-ip ""
      --cluster-announce-port 0
      --cluster-announce-bus-port 0
      --cluster-allow-reads-when-down no
      --cluster-require-full-coverage yes
      --cluster-migration-barrier 1
      --cluster-replica-validity-factor 10
      --cluster-replica-no-failover no
      --cluster-preferred-endpoint-type ip
      --latency-monitor-threshold 0
      --slowlog-log-slower-than 10000
      --slowlog-max-len 128
      --notify-keyspace-events ""
      --hash-max-ziplist-entries 512
      --hash-max-ziplist-value 64
      --list-max-ziplist-size -2
      --list-compress-depth 0
      --set-max-intset-entries 512
      --zset-max-ziplist-entries 128
      --zset-max-ziplist-value 64
      --hll-sparse-max-bytes 3000
      --stream-node-max-bytes 4096
      --stream-node-max-entries 100
      --activedefrag yes
      --active-defrag-ignore-bytes 100mb
      --active-defrag-threshold-lower 10
      --active-defrag-threshold-upper 100
      --active-defrag-cycle-min 5
      --active-defrag-cycle-max 75
      --active-defrag-max-scan-fields 1000
      --auto-aof-rewrite-percentage 100
      --auto-aof-rewrite-min-size 64mb
      --aof-rewrite-incremental-fsync yes
      --rdb-save-incremental-fsync yes
      --aof-load-truncated yes
      --aof-timestamp-enabled no
      --tracking-table-max-keys 1000000
      --enable-protected-configs no
      --enable-debug-command no
      --enable-module-command no
      --enable-scripting yes
      --enable-lfu yes
      --acl-pubsub-default allchannels
    volumes:
      - "/srv/pterodactyl/redis:/data"
      - "/srv/pterodactyl/redis/conf:/usr/local/etc/redis"
      - "/srv/pterodactyl/redis/logs:/var/log/redis"
    environment:
      - REDIS_PASSWORD=redis_secure_password_2024
    ports:
      - "6379:6379"
    networks:
      - pterodactyl_network
      - monitoring_network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2048M
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      <<: *logging-environment
      
  # ===== PANEL SERVICES =====
  panel:
    image: ghcr.io/pterodactyl/panel:latest
    container_name: pterodactyl-panel
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_healthy
    volumes:
      - "/srv/pterodactyl/var/:/app/var/"
      - "/srv/pterodactyl/nginx/:/etc/nginx/http.d/"
      - "/srv/pterodactyl/certs/:/etc/letsencrypt/"
      - "/srv/pterodactyl/logs/:/app/storage/logs"
      - "/srv/pterodactyl/public/:/app/public"
      - "/srv/pterodactyl/resources/:/app/resources"
      - "/srv/pterodactyl/config/:/app/config"
      - "/srv/pterodactyl/scripts/:/app/scripts"
      - "/srv/pterodactyl/backups/:/app/backups"
      - "/srv/pterodactyl/tmp/:/app/tmp"
      - "/etc/timezone:/etc/timezone:ro"
      - "/etc/localtime:/etc/localtime:ro"
    environment:
      <<: [*panel-environment, *mail-environment, *security-environment, *performance-environment, *backup-environment]
      DB_PASSWORD: *db-password
      APP_ENV: "production"
      APP_ENVIRONMENT_ONLY: "false"
      APP_DEBUG: "false"
      CACHE_DRIVER: "redis"
      SESSION_DRIVER: "redis"
      QUEUE_DRIVER: "redis"
      REDIS_HOST: "cache"
      REDIS_PORT: "6379"
      REDIS_PASSWORD: "redis_secure_password_2024"
      REDIS_DATABASE: "0"
      REDIS_CACHE_DATABASE: "1"
      REDIS_SESSION_DATABASE: "2"
      REDIS_QUEUE_DATABASE: "3"
      DB_HOST: "database"
      DB_PORT: "3306"
      DB_DATABASE: "pterodactyl_panel_production"
      DB_USERNAME: "pterodactyl_user"
      DB_PASSWORD: *db-password
      DB_CHARSET: "utf8mb4"
      DB_COLLATION: "utf8mb4_unicode_ci"
      DB_PREFIX: "pterodactyl_"
      DB_STRICT: "true"
      DB_ENGINE: "InnoDB"
      DB_PERSISTENT: "false"
      DB_SSL_MODE: "preferred"
      DB_SSL_CA: "/etc/ssl/certs/ca-certificates.crt"
      DB_SSL_VERIFY: "true"
      DB_TIMEZONE: "+07:00"
      DB_RETRY_TIMEOUT: "5"
      DB_MAX_RETRIES: "3"
      DB_POOL_SIZE: "100"
      DB_IDLE_TIMEOUT: "60"
      DB_MAX_LIFETIME: "60"
      DB_MIN_IDLE: "10"
      DB_WAIT_TIMEOUT: "60"
      DB_CONNECT_TIMEOUT: "10"
      DB_READ_TIMEOUT: "30"
      DB_WRITE_TIMEOUT: "30"
      APP_MAIL_DRIVER: "smtp"
      APP_MAIL_HOST: "smtp.gmail.com"
      APP_MAIL_PORT: "587"
      APP_MAIL_USERNAME: "your-email@gmail.com"
      APP_MAIL_PASSWORD: "your-app-password-here"
      APP_MAIL_ENCRYPTION: "tls"
      APP_MAIL_FROM_ADDRESS: "noreply@yourdomain.com"
      APP_MAIL_FROM_NAME: "Pterodactyl Panel"
      APP_MAIL_REPLY_TO: "support@yourdomain.com"
