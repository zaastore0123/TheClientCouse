# =============================================================================
# NETWORKS
# =============================================================================
networks:
  pterodactyl_network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1
          ip_range: 172.20.0.0/24
          aux_addresses:
            host1: 172.20.0.10
            host2: 172.20.0.11
            host3: 172.20.0.12
            host4: 172.20.0.13
            host5: 172.20.0.14
            host6: 172.20.0.15
            host7: 172.20.0.16
            host8: 172.20.0.17
            host9: 172.20.0.18
            host10: 172.20.0.19
            host11: 172.20.0.20
            host12: 172.20.0.21
            host13: 172.20.0.22
            host14: 172.20.0.23
            host15: 172.20.0.24
            host16: 172.20.0.25
            host17: 172.20.0.26
            host18: 172.20.0.27
            host19: 172.20.0.28
            host20: 172.20.0.29
    enable_ipv6: true
    ipam:
      driver: default
      config:
        - subnet: 2001:db8:1::/64
          gateway: 2001:db8:1::1
          ip_range: 2001:db8:1::/80
    internal: false
    attachable: true
    labels:
      - "maintained_by=pterodactyl"
      - "environment=production"
      - "project=pterodactyl"
      - "version=1.0.0"
      - "created_by=docker-compose"
      - "team=infrastructure"
      - "cost_center=it"
      - "critical=true"
      - "backup_enabled=true"
      - "monitoring_enabled=true"
      - "logging_enabled=true"
      - "security_scan_enabled=true"
      
  monitoring_network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.21.0.0/16
          gateway: 172.21.0.1
          ip_range: 172.21.0.0/24
    enable_ipv6: true
    ipam:
      driver: default
      config:
        - subnet: 2001:db8:2::/64
          gateway: 2001:db8:2::1
          ip_range: 2001:db8:2::/80
    internal: false
    attachable: true
    labels:
      - "maintained_by=pterodactyl"
      - "environment=production"
      - "network_type=monitoring"
      - "monitoring_enabled=true"
      - "logging_enabled=true"
      
  logging_network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.22.0.0/16
          gateway: 172.22.0.1
          ip_range: 172.22.0.0/24
    enable_ipv6: true
    ipam:
      driver: default
      config:
        - subnet: 2001:db8:3::/64
          gateway: 2001:db8:3::1
          ip_range: 2001:db8:3::/80
    internal: false
    attachable: true
    labels:
      - "maintained_by=pterodactyl"
      - "environment=production"
      - "network_type=logging"
      - "logging_enabled=true"
      - "elasticsearch_enabled=true"
      - "logstash_enabled=true"
      - "kibana_enabled=true"

