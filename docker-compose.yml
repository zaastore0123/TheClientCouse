    image: prom/node-exporter:v1.7.0
    container_name: node-exporter
    restart: always
    volumes:
      - "/proc:/host/proc:ro"
      - "/sys:/host/sys:ro"
      - "/:/rootfs:ro"
      - "/dev:/host/dev:ro"
      - "/run:/host/run:ro"
