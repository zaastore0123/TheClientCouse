    - REDIS_COMMANDER_SERVER_HOST=0.0.0.0
    - REDIS_COMMANDER_LOG_LEVEL=info
    - REDIS_COMMANDER_CACHE_ENABLED=true
    - REDIS_COMMANDER_RATE_LIMIT_ENABLED=true
  ports:
    - "8081:8081"
  networks:
    - pterodactyl_network
    - monitoring_network
  depends_on:
    - cache
  deploy:
    resources:
      limits:
        cpus: '0.5'
        memory: 256M
      reservations:
        cpus: '0.1'
        memory: 64M
  logging:
    <<: *logging-environment

# Adminer for database management
adminer:
  image: adminer:4.8.1
  container_name: adminer
  restart: always
  ports:
    - "8083:8080"
  environment:
    - ADMINER_DESIGN=nette
    - ADMINER_PLUGINS=tables-filter,theme-edit
