  # ===== ADDITIONAL SERVICES =====
  nginx-proxy:
    image: nginx:1.25-alpine
    container_name: nginx-proxy
    restart: always
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - "/srv/pterodactyl/nginx:/etc/nginx/conf.d"
      - "/srv/pterodactyl/certs:/etc/nginx/certs"
      - "/srv/pterodactyl/nginx/logs:/var/log/nginx"
      - "/srv/pterodactyl/nginx/conf:/etc/nginx/conf"
      - "/srv/pterodactyl/nginx/html:/usr/share/nginx/html"
      - "/srv/pterodactyl/nginx/stream:/etc/nginx/stream"
    environment:
      - NGINX_HOST=yourdomain.com
      - NGINX_PORT=80
      - NGINX_SSL_PORT=443
      - NGINX_WORKER_PROCESSES=auto
      - NGINX_WORKER_CONNECTIONS=1024
      - NGINX_KEEPALIVE_TIMEOUT=65
      - NGINX_SEND_TIMEOUT=60
      - NGINX_CLIENT_MAX_BODY_SIZE=100M
      - NGINX_CLIENT_BODY_BUFFER_SIZE=128k
      - NGINX_CLIENT_HEADER_BUFFER_SIZE=1k
      - NGINX_LARGE_CLIENT_HEADER_BUFFERS=4 8k
      - NGINX_GZIP_ON=on
      - NGINX_GZIP_COMP_LEVEL=6
      - NGINX_GZIP_VARY=on
      - NGINX_GZIP_TYPES=text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript
      - NGINX_PROXY_BUFFERS=8 32k
      - NGINX_PROXY_BUFFER_SIZE=32k
      - NGINX_PROXY_BUSY_BUFFERS_SIZE=64k
      - NGINX_PROXY_TEMP_FILE_WRITE_SIZE=64k
      - NGINX_PROXY_READ_TIMEOUT=300
      - NGINX_PROXY_CONNECT_TIMEOUT=300
      - NGINX_PROXY_SEND_TIMEOUT=300
      - NGINX_PROXY_HTTP_VERSION=1.1
      - NGINX_PROXY_SET_HEADER_UPGRADE=$http_upgrade
      - NGINX_PROXY_SET_HEADER_CONNECTION=upgrade
      - NGINX_PROXY_SET_HEADER_HOST=$host
      - NGINX_PROXY_SET_HEADER_X-REAL-IP=$remote_addr
      - NGINX_PROXY_SET_HEADER_X-FORWARDED-FOR=$proxy_add_x_forwarded_for
      - NGINX_PROXY_SET_HEADER_X-FORWARDED-PROTO=$scheme
      - NGINX_PROXY_SET_HEADER_X-FORWARDED-HOST=$host
      - NGINX_PROXY_SET_HEADER_X-FORWARDED-PORT=$server_port
      - NGINX_PROXY_SET_HEADER_X-ORIGINAL-URI=$request_uri
      - NGINX_SSL_PROTOCOLS=TLSv1.2 TLSv1.3
      - NGINX_SSL_CIPHERS=ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384
      - NGINX_SSL_PREFER_SERVER_CIPHERS=on
      - NGINX_SSL_SESSION_TIMEOUT=1d
      - NGINX_SSL_SESSION_CACHE=shared:SSL:50m
      - NGINX_SSL_SESSION_TICKETS=on
      - NGINX_SSL_BUFFER_SIZE=4k
      - NGINX_SSL_STAPLING=on
      - NGINX_SSL_STAPLING_VERIFY=on
      - NGINX_SSL_TRUSTED_CERTIFICATE=/etc/nginx/certs/chain.pem
      - NGINX_SSL_VERIFY_CLIENT=off
      - NGINX_SSL_VERIFY_DEPTH=1
      - NGINX_SSL_CLIENT_CERTIFICATE=/etc/nginx/certs/client.crt
      - NGINX_SSL_CLIENT_KEY=/etc/nginx/certs/client.key
      - NGINX_SSL_CLIENT_PASSWORD=
      - NGINX_SSL_CRL=/etc/nginx/certs/crl.pem
      - NGINX_SSL_OCSP_RESPONDER=http://ocsp.yourdomain.com
      - NGINX_SSL_OCSP_RESPONDER_TIMEOUT=5s
      - NGINX_SSL_OCSP_RESPONDER_CACHE=shared:OCSP:10m
      - NGINX_SSL_OCSP_RESPONDER_CACHE_TIMEOUT=1h
    networks:
      - pterodactyl_network
      - monitoring_network
      - logging_network
    depends_on:
      - panel
      - wings
      - grafana
      - kibana
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 64M
    logging:
      <<: *logging-environment
      
  # ===== TOOLS =====
