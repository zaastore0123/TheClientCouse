    - logging_network
  deploy:
    resources:
      limits:
        cpus: '0.5'
        memory: 256M
      reservations:
        cpus: '0.1'
        memory: 64M
  logging:
    <<: *logging-environment

# Watchtower for automatic container updates
watchtower:
  image: containrrr/watchtower:latest
  container_name: watchtower
  restart: always
  volumes:
    - "/var/run/docker.sock:/var/run/docker.sock"
    - "/root/.docker/config.json:/config.json"
  environment:
    - WATCHTOWER_CLEANUP=true
    - WATCHTOWER_INCLUDE_RESTARTING=true
    - WATCHTOWER_INCLUDE_STOPPED=false
    - WATCHTOWER_REVIVE_STOPPED=false
    - WATCHTOWER_SCHEDULE=0 0 4 * * *
    - WATCHTOWER_MONITOR_ONLY=false
    - WATCHTOWER_TIMEOUT=30s
    - WATCHTOWER_POLL_INTERVAL=86400
    - WATCHTOWER_DEBUG=false
    - WATCHTOWER_TRACE=false
    - WATCHTOWER_SCOPE=pterodactyl
    - WATCHTOWER_LABEL_ENABLE=true
    - WATCHTOWER_SEPARATOR=:
    - WATCHTOWER_WARN_ON_HEAD_FAILURE=true
    - WATCHTOWER_ROLLBACK=false
    - WATCHTOWER_SIGNAL=SIGTERM
    - WATCHTOWER_STOP_TIMEOUT=30s
    - WATCHTOWER_NOTIFICATIONS=email
    - WATCHTOWER_NOTIFICATION_EMAIL_FROM=noreply@yourdomain.com
    - WATCHTOWER_NOTIFICATION_EMAIL_TO=admin@yourdomain.com
    - WATCHTOWER_NOTIFICATION_EMAIL_SERVER=smtp.gmail.com
    - WATCHTOWER_NOTIFICATION_EMAIL_SERVER_PORT=587
    - WATCHTOWER_NOTIFICATION_EMAIL_SERVER_USER=your-email@gmail.com
    - WATCHTOWER_NOTIFICATION_EMAIL_SERVER_PASSWORD=your-app-password-here
    - WATCHTOWER_NOTIFICATION_EMAIL_DELAY=2
    - WATCHTOWER_NOTIFICATION_EMAIL_SUBJECT_TAG=watchtower
    - WATCHTOWER_NOTIFICATION_SLACK_HOOK_URL=https://hooks.slack.com/services/T00000000/B00000000/XXXXXXXXXXXXXXXXXXXXXXXX
    - WATCHTOWER_NOTIFICATION_SLACK_IDENTIFIER=watchtower
    - WATCHTOWER_NOTIFICATION_SLACK_CHANNEL=#monitoring
    - WATCHTOWER_NOTIFICATION_SLACK_ICON_EMOJI=:whale:
    - WATCHTOWER_NOTIFICATION_SLACK_ICON_URL=
    - WATCHTOWER_NOTIFICATION_SLACK_USERNAME=Watchtower
    - WATCHTOWER_NOTIFICATION_SLACK_COLOR=good
    - WATCHTOWER_NOTIFICATION_DISCORD_HOOK_URL=https://discord.com/api/webhooks/000000000000000000/XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX
    - WATCHTOWER_NOTIFICATION_DISCORD_IDENTIFIER=watchtower
    - WATCHTOWER_NOTIFICATION_MSTEAMS_HOOK_URL=https://yourdomain.webhook.office.com/webhookb2/xxxx
    - WATCHTOWER_NOTIFICATION_MSTEAMS_IDENTIFIER=watchtower
    - WATCHTOWER_NOTIFICATION_GOTIFY_URL=http://gotify:8080
    - WATCHTOWER_NOTIFICATION_GOTIFY_TOKEN=your-gotify-token
    - WATCHTOWER_NOTIFICATION_GOTIFY_PRIORITY=5
    - WATCHTOWER_NOTIFICATION_GOTIFY_TITLE=Watchtower Update
    - WATCHTOWER_NOTIFICATION_TELEGRAM_TOKEN=1234567890:XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX
    - WATCHTOWER_NOTIFICATION_TELEGRAM_CHAT_ID=-1001234567890
    - WATCHTOWER_NOTIFICATION_TELEGRAM_PARSE_MODE=html
    - WATCHTOWER_NOTIFICATION_TELEGRAM_DISABLE_NOTIFICATION=false
    - WATCHTOWER_LIFECYCLE_HOOKS=true
    - WATCHTOWER_PRE_UPDATE_HOOK=/hooks/pre-update.sh
    - WATCHTOWER_POST_UPDATE_HOOK=/hooks/post-update.sh
    - WATCHTOWER_POST_UPDATE_DELAY=30s
    - WATCHTOWER_RUN_ONCE=false
    - WATCHTOWER_HTTP_API_ENABLED=false
    - WATCHTOWER_HTTP_API_TOKEN=watchtower_api_token_2024
    - WATCHTOWER_HTTP_API_PORT=8080
    - WATCHTOWER_HTTP_API_METRICS=false
    - WATCHTOWER_HTTP_API_METRICS_AUTH=false
    - WATCHTOWER_HTTP_API_METRICS_USER=admin
    - WATCHTOWER_HTTP_API_METRICS_PASSWORD=watchtower_metrics_2024
    - WATCHTOWER_HTTP_API_UPDATE_RESTART=true
    - WATCHTOWER_HTTP_API_UPDATE_STOP=true
    - WATCHTOWER_HTTP_API_UPDATE_START=true
    - WATCHTOWER_HTTP_API_UPDATE_WAIT=30s
  labels:
    - "com.centurylinklabs.watchtower.enable=true"
  networks:
    - monitoring_network
  deploy:
    resources:
      limits:
        cpus: '0.5'
        memory: 256M
      reservations:
        cpus: '0.1'
        memory: 64M
  logging:
    <<: *logging-environment

# Certbot for SSL certificate management
certbot:
  image: certbot/certbot:latest
  container_name: certbot
  restart: always
  entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
  volumes:
    - "/srv/pterodactyl/certs:/etc/letsencrypt"
    - "/srv/pterodactyl/certs/logs:/var/log/letsencrypt"
    - "/srv/pterodactyl/nginx/html:/var/www/html"
  environment:
    - CERTBOT_EMAIL=admin@yourdomain.com
    - CERTBOT_DOMAIN=yourdomain.com
    - CERTBOT_WEBROOT_PATH=/var/www/html
    - CERTBOT_RENEW_HOOK=/etc/letsencrypt/renew-hook.sh
    - CERTBOT_POST_HOOK=/etc/letsencrypt/post-hook.sh
    - CERTBOT_AGREE_TOS=true
    - CERTBOT_TEST_CERT=false
    - CERTBOT_STANDALONE=false
    - CERTBOT_STANDALONE_SUPPORTED_CHALLENGES=http-01
    - CERTBOT_AUTH_HOOK=/etc/letsencrypt/auth-hook.sh
    - CERTBOT_CLEANUP_HOOK=/etc/letsencrypt/cleanup-hook.sh
    - CERTBOT_DEBUG=false
    - CERTBOT_VERBOSE=false
    - CERTBOT_QUIET=true
    - CERTBOT_LOG_LEVEL=info
    - CERTBOT_MAX_LOG_BACKUPS=10
    - CERTBOT_MAX_LOG_SIZE=100M
    - CERTBOT_KEEP_UNTIL_EXPIRING=true
    - CERTBOT_REUSE_KEY=true
    - CERTBOT_RSA_KEY_SIZE=4096
    - CERTBOT_EC_KEY_SIZE=256
    - CERTBOT_PREFERRED_CHALLENGES=http-01
    - CERTBOT_MUST_STAPLE=false
    - CERTBOT_REDIRECT_HTTPS=true
    - CERTBOT_HTTPS_PORT=443
    - CERTBOT_HTTP_PORT=80
    - CERTBOT_TLS_SNI_01_PORT=443
    - CERTBOT_TLS_ALPN_01_PORT=443
    - CERTBOT_ALLOW_SUBDOMAINS=true
    - CERTBOT_ALLOW_WILDCARDS=false
    - CERTBOT_EXPAND=false
    - CERTBOT_VERSION=2.0
    - CERTBOT_SERVER=https://acme-v02.api.letsencrypt.org/directory
    - CERTBOT_STAGING_SERVER=https://acme-staging-v02.api.letsencrypt.org/directory
  networks:
    - pterodactyl_network
  deploy:
    resources:
      limits:
        cpus: '0.5'
        memory: 256M
      reservations:
        cpus: '0.1'
        memory: 64M
  logging:
    <<: *logging-environment

# ===== EXTRA SERVICES UNTUK NAMBAHIN LINE =====

