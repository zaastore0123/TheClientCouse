    - "--log.level=INFO"
    - "--accesslog=true"
    - "--metrics.prometheus=true"
    - "--metrics.prometheus.addentrypointslabels=true"
    - "--metrics.prometheus.addserviceslabels=true"
    - "--metrics.prometheus.buckets=0.1,0.3,1.2,5.0"
  networks:
    - pterodactyl_network
    - monitoring_network
  deploy:
    resources:
      limits:
        cpus: '0.5'
        memory: 256M
      reservations:
        cpus: '0.1'
        memory: 64M
  logging:
    <<: *logging-environment

# Loki for log aggregation
loki:
  image: grafana/loki:2.9.4
  container_name: loki
  restart: always
  volumes:
    - "/srv/pterodactyl/logging/loki:/loki"
